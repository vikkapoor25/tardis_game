<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./assets/login.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome To Tardis!</h1>
    </header>
    <main>
        <form id="register-form">
            <fieldset>
                <label for="username">Login:</label>
                <input type="text" id="username" name="username" placeholder="Please enter your school email">
            </fieldset>
            <fieldset>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Please enter a secure password">
            </fieldset>
            <input type="submit" value="Log In">
        </form>
        <hr />
        <p>Don't have an account? <a href="./register.html">Sign up now</a></p>
    </main>
    <footer>
        <p>2025 All Rights Reserved. Tardis inc.</p>
    </footer>
    
</body>
</html>
